<style>
  .banner {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem 2.5rem;
    background-color: {{ backgroundColor }};
    color: {{ textColor }};
    border-radius: 8px;
    position: relative;
    gap: 1.5rem;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .banner--left-aligned {
    justify-content: flex-start;
  }

  .banner--left-aligned .banner__content {
    text-align: left;
  }

  .banner--split {
    flex-direction: row;
  }

  .banner--split .banner__content {
    text-align: left;
  }

  .banner__content {
    flex: 1;
    text-align: center;
  }

  .banner__heading {
    margin: 0 0 0.5rem 0;
    font-size: 1.75rem;
    font-weight: 700;
    line-height: 1.3;
    color: inherit;
  }

  .banner__message {
    margin: 0 0 1.25rem 0;
    font-size: 1rem;
    line-height: 1.6;
    opacity: 0.9;
    color: inherit;
  }

  .banner__cta {
    display: inline-block;
    padding: 0.625rem 1.5rem;
    background-color: {{ textColor }};
    color: {{ backgroundColor }};
    text-decoration: none;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.9375rem;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  .banner__cta:hover {
    opacity: 0.85;
  }

  @media (max-width: 768px) {
    .banner {
      padding: 1.5rem;
      flex-direction: column !important;
    }

    .banner__content {
      text-align: center !important;
    }
  }
</style>

<div class="banner banner--{{ layout }}">
  <div class="banner__content">
    <h2 class="banner__heading">{{ heading }}</h2>
    <p class="banner__message">{{ message }}</p>
    <a class="banner__cta" href="{{ ctaUrl }}">{{ ctaLabel }}</a>
  </div>
</div>
